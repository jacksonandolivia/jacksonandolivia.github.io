<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding RSVP — Admin</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container container-admin">

    <div id="admin-login-section">
      <h1>Admin</h1>
      <p class="subtitle">RSVP Dashboard</p>
      <div class="card">
        <form id="admin-login-form" novalidate>
          <div class="form-group">
            <label for="admin-password">Admin Password</label>
            <div class="password-wrapper">
              <input type="password" id="admin-password" placeholder="Enter admin password" autocomplete="off" required>
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
                <svg class="eye-icon eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="admin-site-password">Site Password</label>
            <div class="password-wrapper">
              <input type="password" id="admin-site-password" placeholder="Enter site password" autocomplete="off" required>
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
                <svg class="eye-icon eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="submit-btn">Sign In</button>
          <div id="admin-login-error" class="error-msg" hidden></div>
        </form>
      </div>
    </div>

    <div id="admin-dashboard" hidden>
      <div class="dashboard-header">
        <h1>RSVP Dashboard</h1>
        <button id="admin-logout-btn" class="logout-btn">Log Out</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="stat-total-households">0</span>
          <span class="stat-label">Households</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-total-guests">0</span>
          <span class="stat-label">Total Guests</span>
        </div>
        <div class="stat-card stat-rsvped">
          <span class="stat-number" id="stat-rsvped">0</span>
          <span class="stat-label">RSVP'd</span>
        </div>
        <div class="stat-card stat-not-rsvped">
          <span class="stat-number" id="stat-not-rsvped">0</span>
          <span class="stat-label">Not Yet RSVP'd</span>
        </div>
        <div class="stat-card stat-attending">
          <span class="stat-number" id="stat-attending">0</span>
          <span class="stat-label">Attending</span>
        </div>
        <div class="stat-card stat-not-attending">
          <span class="stat-number" id="stat-not-attending">0</span>
          <span class="stat-label">Not Attending</span>
        </div>
      </div>

      <div class="card">
        <h2>Meal Breakdown</h2>
        <ul id="meal-breakdown" class="meal-list"></ul>
      </div>

      <div class="card">
        <h2>All Guests
          <button id="export-csv-btn" class="export-btn">Export CSV</button>
        </h2>
        <div class="table-wrap">
          <table id="admin-table">
            <thead>
              <tr>
                <th>#</th>
                <th>RSVP'd</th>
                <th>Last Name</th>
                <th>First Name</th>
                <th>Age</th>
                <th>Attending</th>
                <th>Meal</th>
                <th>Dietary Restrictions</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    function togglePasswordVisibility(btn) {
      const input = btn.closest('.password-wrapper').querySelector('input');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.querySelector('.eye-open').style.display = isPassword ? 'block' : 'none';
      btn.querySelector('.eye-closed').style.display = isPassword ? 'none' : 'block';
      btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    }
  </script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => Admin.init());</script>
</body>
</html>
