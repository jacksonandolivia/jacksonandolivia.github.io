<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Spectral", serif;
      /* background: #6b7687; */
      background: #F1E9D2;
      color: black;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 64rem;
      width: 100%;
    }
    .hero {
      width: 100%;
      text-align: center;
      padding: 3rem 1rem;
    }
    .hero h1 {
      font-family: "Pinyon Script", cursive;
      font-size: 3.5rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .hero p {
      font-size: 1.25rem;
      margin: 0.25rem 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    .square {
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 2rem;
      font-weight: 600;
      background-size: cover;
      background-position: center;
      padding: 1rem;
      position: relative;
      color: white;

    }
    .square::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
    }
    .square > * {
      position: relative;
      z-index: 1;
    }
    .square a {
      color: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
    }
    .square a:hover {
      text-decoration: underline;
    }
    .square-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      z-index: 1;
    }
    .square-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
    }
    .square-grid > div {
      background-size: cover;
      background-position: center;
    }
    @media (min-width: 768px) {
      body {
        padding: 0;
      }
      .container {
        max-width: 100rem;
      }
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Jackson &amp; Olivia</h1>
      <p>November 7th, 2026</p>
      <p>Ames Iowa</p>
      <br>
      <p>RSVP</p>
    </div>
    <div class="grid">
      <div class="square" style="background-image: url(images/sta_outside.jpeg)">
        <p>Mass</p>
        <p>St. Thomas Aquinas Church</p>
        <p>
          <a href="https://maps.app.goo.gl/2D2PLPyJyNzjk1QF8" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            2210 Lincoln Way | Ames, Iowa 50014
          </a>
        </p>
      </div>
      <div class="square" style="background-image: url(images/gateway.jpg)">
        <p>Reception and Hotel</p>
        <p>Gateway Hotel</p>
        <p>
          <a href="https://maps.app.goo.gl/aQt6Zr1FHnvyhM6V6" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            2100 Green Hills Dr | Ames, Iowa 50014
          </a>
        </p>
        <p>
          <a href="https://www.gatewayames.com/" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            Book a Room
          </a>
        </p>
      </div>
      
      <div class="square">
        <div class="square-grid">
          <div style="background-image: url(images/tent.jpg)"></div>
          <div style="background-image: url(images/bread.jpg)"></div>
          <div style="background-image: url(images/baking.jpg)"></div>
          <div style="background-image: url(images/hiking.jpg)"></div>
        </div>
        <p>Registry</p>
      </div>
      <div class="square" style="background-image: url(images/amesdowntown.jpg)">
        <p>What to do in Ames?</p>
      </div>
    </div>
  </div>
</body>
</html>
