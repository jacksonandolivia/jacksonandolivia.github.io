<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding RSVP</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <a href="/" class="home-link">&larr; Home</a>
    <h1>Olivia Wikle and John Hayes Wedding RSVP</h1>
    <p class="subtitle">Please RSVP by October 10th, 2026</p>

    <div class="card" id="login-section">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter site password" autocomplete="off" required>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
        <div id="login-error" class="error-msg" hidden></div>
      </form>
    </div>

    <div class="card" id="lookup-section" hidden>
      <form id="lookup-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="lookup-firstname">First Name</label>
            <input type="text" id="lookup-firstname" placeholder="Enter your first name" autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <label for="lookup-lastname">Last Name</label>
            <input type="text" id="lookup-lastname" placeholder="Enter your last name" autocomplete="family-name" required>
          </div>
        </div>
        <button type="submit" class="submit-btn">Find My Party</button>
        <div id="lookup-error" class="error-msg" hidden></div>
      </form>
      <button id="logout-from-lookup" class="logout-link">Log Out</button>
    </div>

    <div id="rsvp-container"></div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/rsvp-form.js"></script>
  <script src="/js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => App.init());</script>
</body>
</html>
