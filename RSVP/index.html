<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding RSVP</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <a href="/" class="home-link">&larr; Home</a>
    <h1>Olivia Wikle and John Hayes Wedding RSVP</h1>
    <p class="subtitle">Please RSVP by October 10th, 2026</p>

    <div class="card" id="login-section">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="Enter site password" autocomplete="off" required>
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
        <div id="login-error" class="error-msg" hidden></div>
      </form>
    </div>

    <div class="card" id="lookup-section" hidden>
      <form id="lookup-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="lookup-firstname">First Name</label>
            <input type="text" id="lookup-firstname" placeholder="Enter your first name" autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <label for="lookup-lastname">Last Name</label>
            <input type="text" id="lookup-lastname" placeholder="Enter your last name" autocomplete="family-name" required>
          </div>
        </div>
        <button type="submit" class="submit-btn">Find My Party</button>
        <div id="lookup-error" class="error-msg" hidden></div>
      </form>
      <button id="logout-from-lookup" class="logout-link">Log Out</button>
    </div>

    <div id="rsvp-container"></div>
  </div>

  <script>
    function togglePasswordVisibility(btn) {
      const input = btn.closest('.password-wrapper').querySelector('input');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.querySelector('.eye-open').style.display = isPassword ? 'block' : 'none';
      btn.querySelector('.eye-closed').style.display = isPassword ? 'none' : 'block';
      btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    }
  </script>
  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/rsvp-form.js"></script>
  <script src="/js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => App.init());</script>
</body>
</html>
